name: Build WinCraft

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Install .NET Framework 4.5.2 Targeting Pack
        shell: powershell
        run: |
          $url = "https://download.microsoft.com/download/E/2/1/E21644B5-2DF2-47C2-91BD-63C560427900/NDP452-KB2901907-x86-x64-AllOS-ENU.exe"
          $installer = "$env:TEMP\ndp452.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "/q /norestart" -Wait -NoNewWindow

      - name: Build WinCraft
        shell: powershell
        run: |
          .\publish\build.ps1 -Configuration Release -BuildOnly

      - name: Package artifact (net45)
        shell: powershell
        run: |
          $src = "src\bin\Release\net45\*"
          $dest = "artifact\WinCraft"
          New-Item -ItemType Directory -Path $dest -Force
          Copy-Item -Path $src -Destination $dest -Recurse -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinCraft-portable
          path: artifact/WinCraft/
